services:
  - type: web
    name: swasthai-anemia-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
